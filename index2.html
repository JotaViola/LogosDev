<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LogosDev</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

/* =========================
HEADER
========================= */

header{
  background:#111827;
  border-bottom:2px solid #2563eb;
  padding:20px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-icon{
  width:55px;
  height:55px;

  border-radius:15px;

  background:
  rgba(37,99,235,0.15);

  display:flex;
  align-items:center;
  justify-content:center;

  border:1px solid #2563eb;

  font-size:24px;
}

.logo h1{
  color:#60a5fa;
  font-size:32px;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
    padding:12px 20px;
    border-radius:12px;
    background:linear-gradient(
        135deg,
        var(--gold-light),
        var(--gold-dark)
    );
    color:#222;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    transform:translateY(-2px);
    filter:brightness(1.1);
}

.edit-btn{

  background:#2563eb;

  border:none;

  padding:14px 22px;

  border-radius:12px;

  color:white;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.edit-btn:hover{

  background:#1d4ed8;

  transform:translateY(-2px);
}

/* =========================
LAYOUT
========================= */

.container{
  width:90%;
  margin:auto;
  padding:40px 0;
}

.section{

  background:#1e293b;

  border:1px solid #334155;

  border-radius:20px;

  padding:30px;

  margin-bottom:30px;
}

.section h2{

  color:#60a5fa;

  margin-bottom:25px;

  font-size:32px;
}

/* =========================
PROFILE
========================= */

.profile{
  display:flex;
  align-items:center;
  gap:30px;
  flex-wrap:wrap;
}

.profile img{

  width:140px;
  height:140px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid #2563eb;
}

.profile-info{
  flex:1;
}

.display-field h3{

  font-size:34px;

  margin-bottom:5px;
}

.display-field p{

  color:#cbd5e1;

  margin-bottom:8px;
}

.edit-field{

  display:none;

  width:100%;

  margin-bottom:10px;

  padding:12px;

  border-radius:10px;

  border:1px solid #334155;

  background:#0f172a;

  color:white;
}

textarea.edit-field{

  resize:none;

  height:90px;
}

/* =========================
STATS
========================= */

.stats{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-top:30px;
}

.stat{

  background:#0f172a;

  border:1px solid #334155;

  border-radius:18px;

  padding:25px;

  text-align:center;
}

.stat h3{

  color:#60a5fa;

  font-size:38px;

  margin-bottom:8px;
}

.stat p{
  color:#cbd5e1;
}

.statInput{

  display:none;

  width:100%;

  text-align:center;

  background:transparent;

  border:none;

  color:#60a5fa;

  font-size:38px;

  font-weight:bold;
}

/* =========================
PROJECTS
========================= */

.projects{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));

  gap:20px;
}

.project-card{

  background:#0f172a;

  border:1px solid #334155;

  border-radius:18px;

  padding:25px;

  transition:0.3s;
}

.project-card:hover{

  transform:translateY(-5px);

  border-color:#2563eb;
}

.project-card h3{

  color:#60a5fa;

  margin-bottom:10px;
}

.project-card p{
  color:#cbd5e1;
}

.project-card input,
.project-card textarea{

  display:none;

  width:100%;

  margin-top:10px;

  padding:12px;

  border-radius:10px;

  border:1px solid #334155;

  background:#111827;

  color:white;
}

.project-card textarea{

  resize:none;

  height:80px;
}

/* =========================
ORGANOGRAMA VISUAL
========================= */

.org-chart{

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:40px;
}

.org-level{

  display:flex;

  gap:40px;

  flex-wrap:wrap;

  justify-content:center;
}

.org-card{

  background:
  linear-gradient(
    145deg,
    #111827,
    #0f172a
  );

  border:1px solid #334155;

  border-radius:20px;

  padding:20px 30px;

  min-width:300px;

  display:flex;

  align-items:center;

  gap:20px;

  transition:0.3s;

  box-shadow:
  0 0 20px rgba(37,99,235,0.15);
}

.org-card:hover{

  transform:translateY(-5px);

  border-color:#3b82f6;

  box-shadow:
  0 0 30px rgba(59,130,246,0.35);
}

.org-icon{

  width:70px;
  height:70px;

  border-radius:50%;

  background:
  rgba(37,99,235,0.15);

  border:1px solid #2563eb;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:30px;
}

.org-card h3{

  color:#60a5fa;

  margin-bottom:5px;
}

.org-card p{
  color:#e2e8f0;
}

.org-line{

  width:2px;

  height:40px;

  background:#2563eb;
}

/* =========================
EDITOR ORGANOGRAMA
========================= */

.org-editor{

  display:none;

  flex-direction:column;

  gap:20px;
}

.employee{

  background:#0f172a;

  border:1px solid #334155;

  border-radius:18px;

  padding:20px;
}

.employee-header{

  display:flex;

  align-items:center;

  gap:20px;
}

.employee-fields{
  flex:1;
}

.employee-fields input{

  width:100%;

  margin-bottom:10px;

  padding:12px;

  border-radius:10px;

  border:1px solid #334155;

  background:#111827;

  color:white;
}

/* =========================
ADMIN ACTIONS
========================= */

.admin-actions{

  display:none;

  margin-top:25px;
}

.admin-actions button{

  background:#2563eb;

  border:none;

  padding:14px 20px;

  border-radius:12px;

  color:white;

  font-weight:bold;

  cursor:pointer;

  transition:0.3s;
}

.admin-actions button:hover{

  background:#1d4ed8;

  transform:translateY(-2px);
}

/* =========================
FOOTER
========================= */

footer{

  background:#111827;

  border-top:2px solid #2563eb;

  text-align:center;

  padding:20px;

  color:#94a3b8;
}


/* =====================================
TEMA LOGOS DEV
Adicione no FINAL do seu CSS
===================================== */

:root{
    --gold-light: #CAB273;
    --gold-dark: #917847;

    --bg-dark: #343639;
    --bg-medium: #414347;
    --bg-light: #515153;

    --text-light: #f5f5f5;
}

/* Fundo geral */
body{
    background: var(--bg-dark);
    color: var(--text-light);
}

/* Header */
header{
    background: var(--bg-medium);
    border-bottom: 2px solid var(--gold-dark);
}

/* Logo */
.logo h1{
    color: var(--gold-light);
}

.logo-icon{
    background: rgba(202,178,115,0.15);
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
}

/* Menu */
nav a{
    color: white;
}

nav a:hover{
    color: var(--gold-light);
}

/* Botões */
.edit-btn,
.admin-actions button{
    background: linear-gradient(
        135deg,
        var(--gold-light),
        var(--gold-dark)
    );
    color: #222;
    font-weight: bold;
}

.edit-btn:hover,
.admin-actions button:hover{
    filter: brightness(1.1);
    transform: translateY(-2px);
}

/* Seções */
.section{
    background: var(--bg-medium);
    border: 1px solid var(--gold-dark);
}

.section h2{
    color: var(--gold-light);
}

/* Perfil */
.profile img{
    border: 4px solid var(--gold-dark);
}

.display-field p{
    color: #e5e5e5;
}

/* Campos de edição */
.edit-field,
.project-card input,
.project-card textarea,
.employee-fields input{
    background: var(--bg-dark);
    border: 1px solid var(--gold-dark);
    color: white;
}

/* Cards de estatísticas */
.stat{
    background: var(--bg-dark);
    border: 1px solid var(--gold-dark);
}

.stat h3{
    color: var(--gold-light);
}

.stat p{
    color: #d5d5d5;
}

.statInput{
    color: var(--gold-light);
}

/* Projetos */
.project-card{
    background: var(--bg-dark);
    border: 1px solid var(--gold-dark);
}

.project-card:hover{
    border-color: var(--gold-light);
    box-shadow: 0 0 25px rgba(202,178,115,0.35);
}

.project-card h3{
    color: var(--gold-light);
}

.project-card p{
    color: #d5d5d5;
}

/* Organograma */
.org-card{
    background: linear-gradient(
        145deg,
        var(--bg-medium),
        var(--bg-dark)
    );

    border: 1px solid var(--gold-dark);

    box-shadow:
        0 0 20px rgba(202,178,115,0.15);
}

.org-card:hover{
    border-color: var(--gold-light);

    box-shadow:
        0 0 30px rgba(202,178,115,0.35);

    transform: translateY(-5px);
}

.org-card h3{
    color: var(--gold-light);
}

.org-card p{
    color: #f5f5f5;
}

.org-icon{
    background: rgba(202,178,115,0.15);
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
}

.org-line{
    background: var(--gold-dark);
}

/* Funcionários */
.employee{
    background: var(--bg-dark);
    border: 1px solid var(--gold-dark);
}

/* Footer */
footer{
    background: var(--bg-medium);
    border-top: 2px solid var(--gold-dark);
    color: #d5d5d5;
}

/* Seleção de texto */
::selection{
    background: var(--gold-light);
    color: #222;
}

/* Scrollbar moderna */
::-webkit-scrollbar{
    width: 10px;
}

::-webkit-scrollbar-track{
    background: var(--bg-dark);
}

::-webkit-scrollbar-thumb{
    background: var(--gold-dark);
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover{
    background: var(--gold-light);
}

.logo{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo-img{
    width:90px;
    height:90px;

    border-radius:50%; /* deixa redonda */

    object-fit:cover;

    border:3px solid #CAB273;

    box-shadow:
        0 0 15px rgba(202,178,115,0.4);
}
</style>
</head>

<body>

<header>

  <div class="logo">

    <img
        src="logosdev_logo.jpg"
        alt="LogosDev"
        class="logo-img"
    >

    <h1>LogosDev</h1>

</div>

  <nav>
    <a href="index.html">Projetos</a>
</nav>

  <button
  class="edit-btn"
  onclick="toggleEdit()">

    Editar Portal

  </button>

</header>

<div class="container">

  <!-- PERFIL -->
  <section class="section">

    <h2>
      Perfil Principal
    </h2>

    <div class="profile">

      <img
      id="profileImage"
      src="https://i.imgur.com/2DhmtJ4.png">

      <div class="profile-info">

        <div class="display-field">

          <h3 id="displayName">
            João Vitor
          </h3>

          <p id="displayRole">
            Desenvolvedor Full Stack
          </p>

          <p id="displayBio">
            Especialista em sistemas web,
            desktop e interfaces modernas.
          </p>

        </div>

        <!-- EDIÇÃO -->
        <input
        class="edit-field"
        id="editName"
        value="João Vitor">

        <input
        class="edit-field"
        id="editRole"
        value="Desenvolvedor Full Stack">

        <textarea
        class="edit-field"
        id="editBio">Especialista em sistemas web, desktop e interfaces modernas.</textarea>

        <input
        class="edit-field"
        id="editPhoto"
        placeholder="URL da foto">

      </div>

    </div>

    <!-- STATS -->
    <div class="stats">

  <div class="stat">
    <h3 class="statText">0</h3>
    <input class="statInput" value="0">
    <p>Projetos</p>
  </div>

  <div class="stat">
    <h3 class="statText">0</h3>
    <input class="statInput" value="0">
    <p>Anos</p>
  </div>

</div>

  </section>

  <!-- PROJETOS -->
  <section class="section">

    <h2>
      Projetos
    </h2>

    <div
    class="projects"
    id="projectsContainer">

      <div class="project-card">

        <h3 class="projectTitle">
          Criação LogosDev
        </h3>

        <p class="projectDesc">
          Portal LogosDev
        </p>

        <input
        class="projectTitleInput"
        value="Launcher Gamer">

        <textarea
        class="projectDescInput">Empresa focada na solução</textarea>

      </div>

    </div>

    <div
    class="admin-actions"
    id="projectActions">

      <button onclick="addProject()">

        + Adicionar Projeto

      </button>

    </div>

  </section>

  <!-- ORGANOGRAMA -->
  <section class="section">

    <h2>
      Cargo
    </h2>

    <!-- VISUAL -->
    <div
    class="org-chart"
    id="orgChart">

      <div class="org-level">

        <div class="org-card">

          <div class="org-icon">
            👑
          </div>

          <div>

            <h3>
              CEO
            </h3>

            <p>
              João Vitor
            </p>

          </div>

        </div>

      </div>

    </div>

    <!-- EDITOR -->
    <div
    class="org-editor"
    id="employeeContainer">

      <div class="employee">

        <div class="employee-header">

          <div class="org-icon">
            👤
          </div>

          <div class="employee-fields">

            <input
            class="employeeRoleInput"
            value="CEO">

            <input
            class="employeeNameInput"
            value="João Vitor">

          </div>

        </div>

      </div>

    </div>

    <div
    class="admin-actions"
    id="employeeActions">

      <button onclick="addEmployee()">

        + Adicionar Funcionário

      </button>

    </div>

  </section>

</div>

<footer>

  © 2026 - JV I.S.S.I

</footer>

<script>

let editMode = false;

// =========================
// TOGGLE EDIT
// =========================

function toggleEdit(){

  editMode = !editMode;

  // PERFIL
  document.querySelectorAll(".edit-field")
  .forEach(el => {

    el.style.display =
    editMode ? "block" : "none";

  });

  // STATS
  document.querySelectorAll(".statText")
  .forEach(el => {

    el.style.display =
    editMode ? "none" : "block";

  });

  document.querySelectorAll(".statInput")
  .forEach(el => {

    el.style.display =
    editMode ? "block" : "none";

  });

  // PROJETOS
  document.querySelectorAll(
    ".projectTitle, .projectDesc"
  )
  .forEach(el => {

    el.style.display =
    editMode ? "none" : "block";

  });

  document.querySelectorAll(
    ".projectTitleInput, .projectDescInput"
  )
  .forEach(el => {

    el.style.display =
    editMode ? "block" : "none";

  });

  // ORGANOGRAMA
  document.getElementById("orgChart")
  .style.display =
  editMode ? "none" : "flex";

  document.getElementById(
    "employeeContainer"
  ).style.display =
  editMode ? "flex" : "none";

  // ADMIN
  document.querySelectorAll(".admin-actions")
  .forEach(el => {

    el.style.display =
    editMode ? "block" : "none";

  });

  // =========================
  // SALVAR ALTERAÇÕES
  // =========================

  if(!editMode){

    // PERFIL
    document.getElementById(
      "displayName"
    ).innerText =

    document.getElementById(
      "editName"
    ).value;

    document.getElementById(
      "displayRole"
    ).innerText =

    document.getElementById(
      "editRole"
    ).value;

    document.getElementById(
      "displayBio"
    ).innerText =

    document.getElementById(
      "editBio"
    ).value;

    const photo =
    document.getElementById(
      "editPhoto"
    ).value;

    if(photo !== ""){

      document.getElementById(
        "profileImage"
      ).src = photo;

    }

    // STATS
    document.querySelectorAll(".stat")
    .forEach(stat => {

      stat.querySelector(".statText")
      .innerText =

      stat.querySelector(".statInput")
      .value;

    });

    // PROJETOS
    document.querySelectorAll(".project-card")
    .forEach(card => {

      card.querySelector(".projectTitle")
      .innerText =

      card.querySelector(
        ".projectTitleInput"
      ).value;

      card.querySelector(".projectDesc")
      .innerText =

      card.querySelector(
        ".projectDescInput"
      ).value;

    });

    // ORGANOGRAMA
    updateOrgChart();

    // SALVAR
    saveData();

  }

}

// =========================
// ATUALIZAR ORGANOGRAMA
// =========================

function updateOrgChart(){

  const chart =
  document.getElementById(
    "orgChart"
  );

  chart.innerHTML = "";

  const level =
  document.createElement("div");

  level.classList.add("org-level");

  document.querySelectorAll(".employee")
  .forEach(emp => {

    const role =
    emp.querySelector(
      ".employeeRoleInput"
    ).value;

    const name =
    emp.querySelector(
      ".employeeNameInput"
    ).value;

    const card =
    document.createElement("div");

    card.classList.add("org-card");

    card.innerHTML = `

      <div class="org-icon">
        👤
      </div>

      <div>

        <h3>
          ${role}
        </h3>

        <p>
          ${name}
        </p>

      </div>

    `;

    level.appendChild(card);

  });

  chart.appendChild(level);

}

// =========================
// ADD PROJECT
// =========================

function addProject(
  title = "Novo Projeto",
  desc = "Descrição do projeto."
){

  const container =
  document.getElementById(
    "projectsContainer"
  );

  const div =
  document.createElement("div");

  div.classList.add("project-card");

  div.innerHTML = `

    <h3 class="projectTitle">
      ${title}
    </h3>

    <p class="projectDesc">
      ${desc}
    </p>

    <input
    class="projectTitleInput"
    value="${title}"
    style="display:block;">

    <textarea
    class="projectDescInput"
    style="display:block;">${desc}</textarea>

  `;

  container.appendChild(div);

}

// =========================
// ADD EMPLOYEE
// =========================

function addEmployee(
  role = "Cargo",
  name = "Funcionário"
){

  const container =
  document.getElementById(
    "employeeContainer"
  );

  const div =
  document.createElement("div");

  div.classList.add("employee");

  div.innerHTML = `

    <div class="employee-header">

      <div class="org-icon">
        👤
      </div>

      <div class="employee-fields">

        <input
        class="employeeRoleInput"
        value="${role}">

        <input
        class="employeeNameInput"
        value="${name}">

      </div>

    </div>

  `;

  container.appendChild(div);

}

// =========================
// SAVE DATA
// =========================

function saveData(){

  const data = {

    name:
    document.getElementById(
      "displayName"
    ).innerText,

    role:
    document.getElementById(
      "displayRole"
    ).innerText,

    bio:
    document.getElementById(
      "displayBio"
    ).innerText,

    photo:
    document.getElementById(
      "profileImage"
    ).src,

    stats:[],

    projects:[],

    employees:[]

  };

  // STATS
  document.querySelectorAll(".stat")
  .forEach(stat => {

    data.stats.push(

      stat.querySelector(
        ".statText"
      ).innerText

    );

  });

  // PROJECTS
  document.querySelectorAll(
    ".project-card"
  )
  .forEach(card => {

    data.projects.push({

      title:
      card.querySelector(
        ".projectTitle"
      ).innerText,

      desc:
      card.querySelector(
        ".projectDesc"
      ).innerText

    });

  });

  // EMPLOYEES
  document.querySelectorAll(
    ".employee"
  )
  .forEach(emp => {

    data.employees.push({

      role:
      emp.querySelector(
        ".employeeRoleInput"
      ).value,

      name:
      emp.querySelector(
        ".employeeNameInput"
      ).value

    });

  });

  localStorage.setItem(
    "portalData",
    JSON.stringify(data)
  );

}

// =========================
// LOAD DATA
// =========================

window.onload = function(){

  const saved =
  localStorage.getItem(
    "portalData"
  );

  if(saved){

    const data =
    JSON.parse(saved);

    // PERFIL
    document.getElementById(
      "displayName"
    ).innerText =
    data.name;

    document.getElementById(
      "displayRole"
    ).innerText =
    data.role;

    document.getElementById(
      "displayBio"
    ).innerText =
    data.bio;

    document.getElementById(
      "profileImage"
    ).src =
    data.photo;

    document.getElementById(
      "editName"
    ).value =
    data.name;

    document.getElementById(
      "editRole"
    ).value =
    data.role;

    document.getElementById(
      "editBio"
    ).value =
    data.bio;

    // STATS
    document.querySelectorAll(".stat")
    .forEach((stat,index)=>{

      stat.querySelector(
        ".statText"
      ).innerText =
      data.stats[index];

      stat.querySelector(
        ".statInput"
      ).value =
      data.stats[index];

    });

    // PROJECTS
    document.getElementById(
      "projectsContainer"
    ).innerHTML = "";

    data.projects.forEach(project=>{

      addProject(
        project.title,
        project.desc
      );

    });

    // EMPLOYEES
    document.getElementById(
      "employeeContainer"
    ).innerHTML = "";

    data.employees.forEach(emp=>{

      addEmployee(
        emp.role,
        emp.name
      );

    });

    updateOrgChart();

  }

}
