<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logos Dev - Portal do Cliente</title>

<style>

:root{
    --gold-light:#CAB273;
    --gold-dark:#917847;
    --bg-dark:#343639;
    --bg-medium:#414347;
    --text-light:#f5f5f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--bg-dark);
    color:var(--text-light);
}

/* HEADER */

header{
    background:var(--bg-medium);

    border-bottom:2px solid var(--gold-dark);

    padding:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    flex-wrap:wrap;

    gap:20px;

    border-radius:20px;

    margin:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo-img{
    width:90px;
    height:90px;

    border-radius:50%;
    object-fit:cover;

    border:3px solid var(--gold-light);

    box-shadow:
        0 0 15px rgba(202,178,115,.4);
}

.logo h1{
    color:var(--gold-light);
    font-size:32px;
}

.logo p{
    color:#d5d5d5;
    margin-top:5px;
}

nav{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

nav a{
    padding:12px 20px;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        var(--gold-light),
        var(--gold-dark)
    );

    color:#222;

    font-weight:bold;

    text-decoration:none;

    transition:.3s;
}

nav a:hover{
    transform:translateY(-2px);
    filter:brightness(1.1);
}

/* SEÇÕES */

section{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.titulo{
    text-align:center;
    color:var(--gold-light);
    margin-bottom:30px;
}

/* PORTFÓLIO */

.portfolio{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:var(--bg-medium);
    border:1px solid var(--gold-dark);
    border-radius:20px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h3{
    color:var(--gold-light);
    margin-bottom:10px;
}

/* FORM */

.form-box{
    background:var(--bg-medium);
    padding:25px;
    border-radius:20px;
    border:1px solid var(--gold-dark);
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid var(--gold-dark);
    background:var(--bg-dark);
    color:white;
}

textarea{
    min-height:140px;
}

button{
    background:linear-gradient(
        135deg,
        var(--gold-light),
        var(--gold-dark)
    );
    color:#222;
    border:none;
    padding:14px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}


.cliente{
    background:#555;
}

.dev{
    background:#7b6a3c;
    margin-left:auto;
}

.chat-input{
    display:flex;
    gap:10px;
}

.chat-input input{
    margin:0;
}

footer{
    text-align:center;
    padding:25px;
    border-top:1px solid var(--gold-dark);
    color:#bbb;
}

</style>

</head>
<body>

<header>

    <div class="logo">

        <img src="logosdev_logo.jpg" class="logo-img">

        <div>
            <h1>Logos Dev</h1>
            <p>Do código ao propósito</p>
        </div>

    </div>
</header>

<section>


<h2 class="titulo">Projetos Realizados</h2>

<div class="portfolio">

    <div class="card">
        <img src="https://picsum.photos/500/300?1">
        <div class="card-content">
            <h3>Sistema Financeiro</h3>
            <p>Dashboard completo para controle financeiro.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/500/300?2">
        <div class="card-content">
            <h3>ERP Empresarial</h3>
            <p>Controle de estoque, vendas e relatórios.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/500/300?3">
        <div class="card-content">
            <h3>Portal Web</h3>
            <p>Site institucional responsivo.</p>
        </div>
    </div>

</div>

</section>

<section>

<h2 class="titulo">Solicitar Projeto</h2>

<div class="modal-content">

    <input
        type="text"
        id="nome"
        placeholder="Seu nome">

    <input
        type="text"
        id="telefone"
        placeholder="Telefone">

    <textarea
        id="descricao"
        placeholder="Descreva seu projeto"></textarea>

    <button onclick="enviarProjeto()">
        Solicitar Projeto
    </button>

</div>
```

</section>

<section>

</section>

<footer>

    <span>© Logos Dev</span>

    <a href="index2.html" class="btn-kanban">
        📋
    </a>

</footer>

<script>

function enviarProjeto(){

    const nome =
    document.getElementById("nome").value;

    const telefone =
    document.getElementById("telefone").value;

    const descricao =
    document.getElementById("descricao").value;

    if(!nome || !telefone || !descricao){
        alert("Preencha todos os campos.");
        return;
    }

    let projetos =
    JSON.parse(localStorage.getItem("projetos")) || [];

    projetos.push({
        id: Date.now(),
        nome:"Solicitação Cliente",
        cliente:nome,
        telefone:telefone,
        descricao:descricao,
        status:"solicitacao",
        inicio:"",
        prazo:"",
        link:""
    });

    localStorage.setItem(
        "projetos",
        JSON.stringify(projetos)
    );

    alert("Solicitação enviada!");

    document.getElementById("nome").value="";
    document.getElementById("telefone").value="";
    document.getElementById("descricao").value="";
}

function enviarMensagem(){

    const texto =
    document.getElementById("mensagem").value;

    if(!texto) return;

    const chat =
    document.getElementById("chatMensagens");

    chat.innerHTML += `
        <div class="msg cliente">
            ${texto}
        </div>
    `;

    document.getElementById("mensagem").value="";

    chat.scrollTop =
    chat.scrollHeight;
}

</script>

</body>
</html>
